openapi: 3.1.0
info:
  title: Feature Voting System API
  version: 1.0.0
  description: >
    REST/JSON API for the Feature Voting System (Option A — synchronous atomic
    increments). All endpoints require authentication (JWT bearer); there is no
    public or anonymous read path (FR-001). List endpoints use cursor (keyset)
    pagination and support conditional requests via ETag / If-None-Match (304).
servers:
  - url: http://localhost:8080
    description: Local Docker Compose

tags:
  - name: auth
  - name: requests
  - name: votes
  - name: ops

paths:
  /healthz:
    get:
      tags: [ops]
      summary: Liveness probe
      security: []
      responses:
        "200": { description: Process is alive }
  /readyz:
    get:
      tags: [ops]
      summary: Readiness probe (checks Postgres + Redis)
      security: []
      responses:
        "200": { description: Ready to serve traffic }
        "503": { description: A dependency is unavailable }
  /metrics:
    get:
      tags: [ops]
      summary: Prometheus metrics (RED)
      security: []
      responses:
        "200": { description: Prometheus exposition format }

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: Email already registered }

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate and obtain tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /requests:
    get:
      tags: [requests]
      summary: List feature requests (paginated, ranked)
      description: >
        Keyset pagination via `cursor`. Ranking selected by `sort`. Supports
        conditional GET — send `If-None-Match` to receive 304 when unchanged
        (FR-015).
      parameters:
        - name: sort
          in: query
          schema: { type: string, enum: [top, trending, new], default: top }
        - name: cursor
          in: query
          description: Opaque keyset cursor from a prior response's `next_cursor`.
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: If-None-Match
          in: header
          schema: { type: string }
      responses:
        "200":
          description: A bounded page of feature requests
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestPage" }
        "304": { description: Not Modified (matches If-None-Match) }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [requests]
      summary: Submit a new feature request
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRequest" }
      responses:
        "201":
          description: Created (vote_count starts at 0)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureRequest" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /requests/{id}:
    get:
      tags: [requests]
      summary: Get a single feature request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /requests/{id}/vote:
    put:
      tags: [votes]
      summary: Cast an upvote (idempotent)
      description: >
        Records at most one active upvote for the caller (FR-007). Idempotent —
        repeating returns 200 with the unchanged count. Rejects self-votes
        (FR-008). The vote + denormalized count move in one transaction.
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Vote active (newly cast or already present)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoteResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Self-vote rejected (FR-008)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [votes]
      summary: Remove the caller's upvote (idempotent)
      description: >
        Removes the caller's active upvote and decrements the count by exactly
        one (FR-009). Idempotent — removing a non-existent vote returns 200 with
        the unchanged count. Caller is eligible to re-vote afterward.
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: No active vote for the caller
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoteResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  security:
    - bearerAuth: []

  parameters:
    RequestId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Feature request does not exist (FR-018)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Input failed validation (FR-003)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: Access token lifetime (seconds) }
    CreateRequest:
      type: object
      required: [title, description]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, minLength: 1, maxLength: 5000 }
    FeatureRequest:
      type: object
      required: [id, author_id, title, description, vote_count, viewer_has_voted, created_at]
      properties:
        id: { type: string, format: uuid }
        author_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        vote_count: { type: integer, minimum: 0 }
        viewer_has_voted:
          type: boolean
          description: Whether the authenticated caller currently holds an active vote.
        created_at: { type: string, format: date-time }
    RequestPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/FeatureRequest" }
        next_cursor:
          type: [string, "null"]
          description: Opaque cursor for the next page; null when no more pages.
    VoteResult:
      type: object
      required: [request_id, vote_count, viewer_has_voted]
      properties:
        request_id: { type: string, format: uuid }
        vote_count: { type: integer, minimum: 0 }
        viewer_has_voted: { type: boolean }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [validation_failed, unauthorized, forbidden_self_vote, not_found, conflict, rate_limited, internal]
            message: { type: string }
            details:
              type: object
              additionalProperties: true

security:
  - bearerAuth: []
