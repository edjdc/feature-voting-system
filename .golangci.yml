version: "2"

run:
  timeout: 5m
  go: "1.26"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/edivilsondalacosta/feature-voting-system

linters:
  enable:
    - govet
    - staticcheck
    - gosec
    - errcheck
  settings:
    gosec:
      excludes:
        - G304
  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - gosec
